<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票分析儀表板 · AI Terminal</title>
<meta name="description" content="AI 驅動的每日股票分析報告，提供技術面、基本面、多空辯論等深度分析。">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- 背景光暈 -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">INITIALIZING TERMINAL...</div>
</div>

<!-- Ticker Strip -->
<div class="ticker-strip">
  <div class="ticker-inner" id="tickerInner"></div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1>市場分析 <span>TERMINAL</span></h1>
    <div class="subtitle">// AI-POWERED DAILY ANALYSIS REPORT</div>
  </div>
  <div class="header-right">
    <div class="date-selector">
      <button onclick="changeDate(-1)" title="前一天">◀</button>
      <input type="date" id="dateInput" onchange="loadDate(this.value)">
      <button onclick="changeDate(1)" title="後一天">▶</button>
    </div>
    <div class="date-badge" id="dateBadge">載入中...</div>
  </div>
</div>

<!-- Navigation Tabs -->
<div class="nav-tabs" id="navTabs"></div>

<!-- Main Content -->
<div class="main" id="mainContent"></div>

<script src="app.js"></script>
</body>
</html>
