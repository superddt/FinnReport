<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日股票分析報告</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary:   #ffffff;
  --bg-secondary: #f5f5f3;
  --bg-tertiary:  #eaeae7;
  --text-primary:   #1a1a18;
  --text-secondary: #5c5c58;
  --text-tertiary:  #9b9b96;
  --border-light: rgba(0,0,0,0.08);
  --border-mid:   rgba(0,0,0,0.16);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans TC', 'PingFang TC', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary:   #1c1c1a;
    --bg-secondary: #252523;
    --bg-tertiary:  #2f2f2c;
    --text-primary:   #f0efe8;
    --text-secondary: #a8a89f;
    --text-tertiary:  #6b6b65;
    --border-light: rgba(255,255,255,0.07);
    --border-mid:   rgba(255,255,255,0.14);
  }
}

body {
  font-family: var(--sans);
  background: var(--bg-secondary);
  color: var(--text-primary);
  min-height: 100vh;
}

/* ── Top bar ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-primary);
  border-bottom: 0.5px solid var(--border-light);
  padding: 0 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  gap: 12px;
}

.site-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  flex-shrink: 0;
}

.site-name span {
  color: var(--text-tertiary);
  font-weight: 400;
}

/* Date navigator */
.date-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.nav-btn {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border-mid);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, color 0.12s;
  font-family: var(--sans);
}

.nav-btn:hover:not(:disabled) {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.date-display {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  padding: 0 6px;
  min-width: 96px;
  text-align: center;
  cursor: pointer;
  border-radius: var(--radius-sm);
  padding: 5px 8px;
  border: 0.5px solid transparent;
  transition: border-color 0.12s, background 0.12s;
}

.date-display:hover {
  border-color: var(--border-mid);
  background: var(--bg-secondary);
}

/* Date picker popup */
.date-picker-wrap {
  position: relative;
}

.date-picker-popup {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--bg-primary);
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-lg);
  padding: 12px;
  min-width: 220px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 200;
}

.date-picker-popup.open { display: block; }

.date-picker-popup h4 {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-bottom: 8px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.date-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 260px;
  overflow-y: auto;
}

.date-item {
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text-primary);
  transition: background 0.1s;
}

.date-item:hover { background: var(--bg-secondary); }
.date-item.active { background: var(--text-primary); color: var(--bg-primary); }
.date-item .stock-count { font-size: 12px; color: var(--text-tertiary); }
.date-item.active .stock-count { color: var(--bg-secondary); }

/* ── Main layout ── */
.page {
  max-width: 960px;
  margin: 0 auto;
  padding: 1.25rem 1rem 3rem;
}

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 1.25rem;
  font-size: 13px;
  color: var(--text-tertiary);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-tertiary);
}

.status-dot.ok    { background: #1D9E75; }
.status-dot.error { background: #E24B4A; }
.status-dot.loading {
  background: #BA7517;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

/* ── Ticker tabs ── */
.ticker-nav {
  display: flex;
  gap: 6px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.ticker-btn {
  padding: 7px 16px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border-mid);
  background: var(--bg-primary);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--sans);
  font-weight: 500;
  transition: all 0.13s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ticker-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.ticker-btn.active {
  background: var(--text-primary);
  color: var(--bg-primary);
  border-color: transparent;
}

.ticker-badge-buy  { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; }
.ticker-badge-hold { width: 6px; height: 6px; border-radius: 50%; background: #EF9F27; }
.ticker-badge-sell { width: 6px; height: 6px; border-radius: 50%; background: #E24B4A; }

/* ── Stock panel ── */
.stock-panel { display: none; }
.stock-panel.active { display: block; }

/* Header card */
.header-card {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 1rem;
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-xl);
  padding: 1.25rem 1.5rem;
}

.ticker-name {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-primary);
}

.ticker-name span { font-size: 14px; color: var(--text-tertiary); font-weight: 400; }
.ticker-sub { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

.price-col {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}

.price-value { font-size: 24px; font-weight: 500; color: var(--text-primary); }

/* Decision badge */
.badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.03em;
}

.badge-BUY  { background: #EAF3DE; color: #27500A; }
.badge-HOLD { background: #FAEEDA; color: #633806; }
.badge-SELL { background: #FCEBEB; color: #791F1F; }

@media (prefers-color-scheme: dark) {
  .badge-BUY  { background: #173404; color: #C0DD97; }
  .badge-HOLD { background: #412402; color: #FAC775; }
  .badge-SELL { background: #501313; color: #F7C1C1; }
}

/* Metrics grid */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 8px;
  margin-bottom: 1rem;
}

.metric {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 11px 13px;
}

.metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
.metric-value { font-size: 19px; font-weight: 500; color: var(--text-primary); }
.metric-unit  { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

/* Price bar */
.price-bar {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 11px 14px;
  margin-bottom: 1rem;
}

.price-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.price-track {
  height: 5px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  position: relative;
}

.price-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(to right, #1D9E75, #9FE1CB);
}

.price-dot {
  position: absolute;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--text-primary);
  top: -3px;
  transform: translateX(-50%);
  border: 2px solid var(--bg-primary);
}

/* Sections */
.sections {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}

@media (min-width: 580px) {
  .sections { grid-template-columns: 1fr 1fr; }
  .section-card.full { grid-column: 1 / -1; }
}

.section-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 15px;
  cursor: pointer;
  user-select: none;
  background: var(--bg-secondary);
  transition: background 0.1s;
}

.section-header:hover { background: var(--bg-tertiary); }

.section-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 7px;
}

.section-icon {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  flex-shrink: 0;
}

.chevron {
  font-size: 9px;
  color: var(--text-tertiary);
  transition: transform 0.18s;
  line-height: 1;
}

.chevron.open { transform: rotate(180deg); }

.section-body {
  padding: 15px;
  display: none;
  border-top: 0.5px solid var(--border-light);
}

.section-body.open { display: block; }

/* KV list */
.kv-list {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 14px;
  font-size: 13px;
}

.kv-key { color: var(--text-secondary); white-space: nowrap; }
.kv-val { color: var(--text-primary); font-weight: 500; }

/* Prose */
.prose {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text-secondary);
}

.prose + .prose { margin-top: 8px; }

.divider { height: 0.5px; background: var(--border-light); margin: 11px 0; }

/* Tag row */
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }

.tag {
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 20px;
  border: 0.5px solid var(--border-mid);
  color: var(--text-secondary);
}

/* Risk list */
.risk-list { display: flex; flex-direction: column; gap: 8px; }

.risk-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-secondary);
}

.risk-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
  background: #E24B4A;
}

/* Verdict */
.verdict-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.verdict-card {
  flex: 1;
  min-width: 120px;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  padding: 11px 13px;
}

.verdict-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
.verdict-value { font-size: 13px; font-weight: 500; color: var(--text-primary); }

/* Strategy */
.strategy-list { display: flex; flex-direction: column; gap: 7px; }

.strategy-item {
  border-left: 2px solid var(--border-mid);
  padding: 7px 11px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.65;
  background: var(--bg-secondary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

/* ── States ── */
.state-box {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 3rem 2rem;
  text-align: center;
}

.state-box h3 { font-size: 16px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px; }
.state-box p  { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

/* ── Footer ── */
.footer {
  text-align: center;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2.5rem;
  padding-top: 1rem;
  border-top: 0.5px solid var(--border-light);
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="topbar">
  <div class="site-name">每日股票分析 <span>Daily Stock Report</span></div>

  <div class="date-nav">
    <button class="nav-btn" id="btn-prev" title="前一天" onclick="navigateDate(-1)">‹</button>

    <div class="date-picker-wrap">
      <div class="date-display" id="date-display" onclick="toggleDatePicker()">—</div>
      <div class="date-picker-popup" id="date-picker">
        <h4>選擇日期</h4>
        <div class="date-list" id="date-list"></div>
      </div>
    </div>

    <button class="nav-btn" id="btn-next" title="後一天" onclick="navigateDate(+1)">›</button>
  </div>
</div>

<!-- ── Page ── -->
<div class="page">
  <div class="status-bar">
    <span class="status-dot loading" id="status-dot"></span>
    <span id="status-text">載入中…</span>
  </div>

  <div id="ticker-nav-wrap" style="display:none">
    <div class="ticker-nav" id="ticker-nav"></div>
  </div>

  <div id="panels-wrap"></div>

  <div class="footer">本報告僅供參考，不構成投資建議。投資有風險，入市須謹慎。</div>
</div>

<script>
/* ════════════════════════════════════════════
   CONFIG — adjust XML folder path if needed
   ════════════════════════════════════════════ */
const XML_DIR = './xml/';

/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */
let availableDates = [];   // sorted desc: ['2026-04-20', '2026-04-19', …]
let currentDate    = null;
let currentTicker  = null;

/* ════════════════════════════════════════════
   BOOT — discover available XML files
   We attempt to fetch an index.json first;
   if not found, fall back to trying today ±30
   ════════════════════════════════════════════ */
async function boot() {
  setStatus('loading', '掃描可用報告…');

  // Try fetching xml/index.json (generated by n8n or build step)
  try {
    const r = await fetch(XML_DIR + 'index.json', { cache: 'no-cache' });
    if (r.ok) {
      const data = await r.json();
      availableDates = (data.dates || []).sort((a, b) => b.localeCompare(a));
    }
  } catch (_) {}

  // Fallback: probe last 60 days
  if (availableDates.length === 0) {
    availableDates = await probeDates(60);
  }

  if (availableDates.length === 0) {
    setStatus('error', '找不到任何報告 XML 檔案');
    document.getElementById('panels-wrap').innerHTML =
      `<div class="state-box"><h3>尚無報告</h3>
       <p>請將 XML 檔案放置於 <code>${XML_DIR}</code> 資料夾，<br>
       檔名格式：<code>YYYY-MM-DD.xml</code></p></div>`;
    return;
  }

  // Populate date picker list
  buildDateList();

  // Load the most recent date
  await loadDate(availableDates[0]);
}

/* Probe whether a date's XML exists */
async function probeDates(days) {
  const found = [];
  const today = new Date();
  const checks = [];
  for (let i = 0; i < days; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    checks.push(dateStr(d));
  }
  // Batch probe (Promise.allSettled)
  const results = await Promise.allSettled(
    checks.map(d =>
      fetch(XML_DIR + d + '.xml', { method: 'HEAD', cache: 'no-cache' })
        .then(r => r.ok ? d : null)
    )
  );
  results.forEach(r => { if (r.status === 'fulfilled' && r.value) found.push(r.value); });
  return found.sort((a, b) => b.localeCompare(a));
}

/* ════════════════════════════════════════════
   LOAD DATE
   ════════════════════════════════════════════ */
async function loadDate(date) {
  if (date === currentDate) { closeDatePicker(); return; }
  currentDate = date;
  currentTicker = null;

  setStatus('loading', `載入 ${date} 報告…`);
  updateNavButtons();
  updateDateDisplay();
  updateDateList();
  closeDatePicker();

  const url = XML_DIR + date + '.xml';
  let xmlDoc;
  try {
    const r = await fetch(url, { cache: 'no-cache' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    xmlDoc = new DOMParser().parseFromString(text, 'application/xml');
    const parseErr = xmlDoc.querySelector('parsererror');
    if (parseErr) throw new Error('XML 格式錯誤');
  } catch (e) {
    setStatus('error', `無法載入 ${date}：${e.message}`);
    document.getElementById('ticker-nav-wrap').style.display = 'none';
    document.getElementById('panels-wrap').innerHTML =
      `<div class="state-box"><h3>載入失敗</h3><p>${e.message}</p></div>`;
    return;
  }

  renderReport(xmlDoc, date);
}

/* ════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════ */
function renderReport(xmlDoc, date) {
  const stocks = Array.from(xmlDoc.querySelectorAll('stock'));
  if (stocks.length === 0) {
    setStatus('error', `${date} 報告無股票資料`);
    return;
  }

  const navEl    = document.getElementById('ticker-nav');
  const panelsEl = document.getElementById('panels-wrap');
  navEl.innerHTML    = '';
  panelsEl.innerHTML = '';

  stocks.forEach((stock, idx) => {
    const ticker   = stock.getAttribute('ticker');
    const name     = stock.getAttribute('name');
    const sector   = stock.getAttribute('sector');
    const exchange = stock.getAttribute('exchange') || '';
    const decision = txt(stock, 'decision') || 'HOLD';
    const price    = txt(stock, 'price');
    const low52    = txt(stock, 'week52_low');
    const high52   = txt(stock, 'week52_high');

    // Ticker tab
    const btn = document.createElement('button');
    btn.className = 'ticker-btn' + (idx === 0 ? ' active' : '');
    btn.dataset.ticker = ticker;
    btn.onclick = () => switchStock(ticker);
    btn.innerHTML = `<span class="ticker-badge-${decision}"></span>${ticker}`;
    navEl.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'stock-panel' + (idx === 0 ? ' active' : '');
    panel.id = 'panel-' + ticker;
    panel.innerHTML = buildPanel(stock, { ticker, name, sector, exchange, decision, price, low52, high52 });
    panelsEl.appendChild(panel);
  });

  currentTicker = stocks[0].getAttribute('ticker');
  document.getElementById('ticker-nav-wrap').style.display = 'block';
  setStatus('ok', `${date} · ${stocks.length} 支股票`);
}

function buildPanel(stock, { ticker, name, sector, exchange, decision, price, low52, high52 }) {
  // Price position in 52w range
  const pct = (low52 && high52 && price)
    ? Math.min(100, Math.max(0, ((+price - +low52) / (+high52 - +low52)) * 100)).toFixed(1)
    : 50;

  // Metrics
  const metrics = Array.from(stock.querySelectorAll('metrics > metric'));
  const metricsHTML = metrics.map(m =>
    `<div class="metric">
      <div class="metric-label">${m.getAttribute('key')}</div>
      <div class="metric-value">${m.getAttribute('value')}</div>
      <div class="metric-unit">${m.getAttribute('sub') || ''}</div>
    </div>`
  ).join('');

  // Sections
  const sections = Array.from(stock.querySelectorAll('section'));
  const sectionsHTML = sections.map(sec => buildSection(sec)).join('');

  return `
    <div class="header-card">
      <div>
        <div class="ticker-name">${name} <span>${ticker}</span></div>
        <div class="ticker-sub">${sector}${exchange ? ' · ' + exchange : ''}</div>
      </div>
      <div class="price-col">
        <span class="badge badge-${decision}">${decisionLabel(decision)}</span>
        <span class="price-value">$${price}</span>
      </div>
    </div>

    <div class="metrics-grid">${metricsHTML}</div>

    <div class="price-bar">
      <div class="price-bar-label">
        <span>52週低 $${low52}</span>
        <span>當前 $${price}</span>
        <span>52週高 $${high52}</span>
      </div>
      <div class="price-track">
        <div class="price-fill" style="width:100%"></div>
        <div class="price-dot" style="left:${pct}%"></div>
      </div>
    </div>

    <div class="sections">${sectionsHTML}</div>`;
}

function buildSection(sec) {
  const id       = sec.getAttribute('id');
  const title    = sec.getAttribute('title');
  const icon     = sec.getAttribute('icon');
  const colorBg  = sec.getAttribute('color_bg')   || '#f0f0ee';
  const colorTxt = sec.getAttribute('color_text')  || '#333';
  const isOpen   = sec.getAttribute('open') === 'true' || id === 'sentiment' || id === 'risk';
  const isFull   = sec.getAttribute('full') === 'true';
  const isVerdict = id === 'verdict';

  let bodyHTML = '';

  if (isVerdict) {
    // Verdict cards
    const vcards = Array.from(sec.querySelectorAll('verdict_card'));
    const vcHTML = vcards.map(v => {
      const vc = v.getAttribute('value_color') || '';
      return `<div class="verdict-card">
        <div class="verdict-label">${v.getAttribute('label')}</div>
        <div class="verdict-value"${vc ? ` style="color:${vc};font-size:15px"` : ''}>${v.getAttribute('value')}</div>
      </div>`;
    }).join('');

    const strategies = Array.from(sec.querySelectorAll('strategy'));
    const stHTML = strategies.map(s =>
      `<div class="strategy-item">${s.textContent}</div>`
    ).join('');

    bodyHTML = `
      <div class="verdict-row">${vcHTML}</div>
      <div class="strategy-list">${stHTML}</div>`;

  } else if (id === 'risk') {
    const risks = Array.from(sec.querySelectorAll('risk'));
    bodyHTML = `<div class="risk-list">` +
      risks.map(r => `<div class="risk-item"><span class="risk-dot"></span><span>${r.textContent}</span></div>`).join('') +
      `</div>`;

  } else {
    // KV pairs
    const kvs = Array.from(sec.querySelectorAll('kv'));
    if (kvs.length) {
      bodyHTML += `<div class="kv-list">` +
        kvs.map(k => `<span class="kv-key">${k.getAttribute('key')}</span><span class="kv-val">${k.getAttribute('val')}</span>`).join('') +
        `</div>`;
    }

    // Prose
    const proses = Array.from(sec.querySelectorAll('prose'));
    if (proses.length) {
      if (kvs.length) bodyHTML += `<div class="divider"></div>`;
      bodyHTML += proses.map(p => `<div class="prose">${p.textContent}</div>`).join('');
    }

    // Tags
    const tags = Array.from(sec.querySelectorAll('tag'));
    if (tags.length) {
      bodyHTML += `<div class="tag-row">` +
        tags.map(t => `<span class="tag">${t.textContent}</span>`).join('') +
        `</div>`;
    }
  }

  return `
    <div class="section-card${isFull ? ' full' : ''}">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">
          <span class="section-icon" style="background:${colorBg};color:${colorTxt}">${icon}</span>
          ${title}
        </div>
        <span class="chevron${isOpen ? ' open' : ''}">▼</span>
      </div>
      <div class="section-body${isOpen ? ' open' : ''}">${bodyHTML}</div>
    </div>`;
}

/* ════════════════════════════════════════════
   UI INTERACTIONS
   ════════════════════════════════════════════ */
function switchStock(ticker) {
  currentTicker = ticker;
  document.querySelectorAll('.stock-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.ticker-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.ticker === ticker);
  });
  const panel = document.getElementById('panel-' + ticker);
  if (panel) panel.classList.add('active');
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.chevron');
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function navigateDate(delta) {
  const idx = availableDates.indexOf(currentDate);
  // delta -1 = prev day = higher index; delta +1 = next day = lower index
  const nextIdx = idx - delta;
  if (nextIdx >= 0 && nextIdx < availableDates.length) {
    loadDate(availableDates[nextIdx]);
  }
}

function updateNavButtons() {
  const idx = availableDates.indexOf(currentDate);
  document.getElementById('btn-prev').disabled = (idx >= availableDates.length - 1);
  document.getElementById('btn-next').disabled = (idx <= 0);
}

function updateDateDisplay() {
  document.getElementById('date-display').textContent = currentDate || '—';
}

function buildDateList() {
  const listEl = document.getElementById('date-list');
  listEl.innerHTML = availableDates.map(d =>
    `<div class="date-item${d === currentDate ? ' active' : ''}" data-date="${d}" onclick="loadDate('${d}')">
       <span>${d}</span>
     </div>`
  ).join('');
}

function updateDateList() {
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.dataset.date === currentDate);
  });
}

function toggleDatePicker() {
  document.getElementById('date-picker').classList.toggle('open');
}

function closeDatePicker() {
  document.getElementById('date-picker').classList.remove('open');
}

// Close date picker on outside click
document.addEventListener('click', e => {
  const wrap = document.querySelector('.date-picker-wrap');
  if (wrap && !wrap.contains(e.target)) closeDatePicker();
});

/* ════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════ */
function txt(parent, tag) {
  const el = parent.querySelector(tag);
  return el ? el.textContent.trim() : '';
}

function dateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function decisionLabel(d) {
  return { BUY: '買入 BUY', HOLD: '持有 HOLD', SELL: '賣出 SELL' }[d] || d;
}

function setStatus(type, msg) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className  = 'status-dot ' + type;
  text.textContent = msg;
}

/* ════════════════════════════════════════════
   LAUNCH
   ════════════════════════════════════════════ */
boot();
</script>
</body>
</html>
